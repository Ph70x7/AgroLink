<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    select, button {
      padding: 8px;
      margin-right: 10px;
      margin-top: 5px;
    }

    canvas {
      margin-top: 20px;
      background: white;
      padding: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>📊 Dashboard</h2>

<a href="/upload">📤 Upload Excel</a>

<div class="card">
  <h3>Filtros</h3>

  <select id="produto"></select>
  <select id="produtor"></select>
  <select id="mes"></select>

  <button onclick="carregar()">Filtrar</button>
</div>

<div class="card">
  <h3>KPIs</h3>
  <p>Localidades: <b id="k1">0</b></p>
  <p>Produtores: <b id="k2">0</b></p>
  <p>Produtos: <b id="k3">0</b></p>
  <p>Beneficiamentos: <b id="k4">0</b></p>
  <p>Faturamento: <b id="k5">R$ 0,00</b></p>
</div>

<div class="card">
  <canvas id="bar"></canvas>
</div>

<div class="card">
  <canvas id="pie"></canvas>
</div>

<script>
let barChart, pieChart;

// =========================
// CARREGAR FILTROS
// =========================
async function carregarFiltros() {
  try {
    const res = await fetch("/filtros");
    const data = await res.json();

    const produtoSelect = document.getElementById("produto");
    const produtorSelect = document.getElementById("produtor");
    const mesSelect = document.getElementById("mes");

    // reset
    produtoSelect.innerHTML = '<option value="">Todos Produtos</option>';
    produtorSelect.innerHTML = '<option value="">Todos Produtores</option>';
    mesSelect.innerHTML = '<option value="">Todos Meses</option>';

    data.produtos.forEach(p => {
      produtoSelect.innerHTML += `<option value="${p}">${p}</option>`;
    });

    data.produtores.forEach(p => {
      produtorSelect.innerHTML += `<option value="${p}">${p}</option>`;
    });

    data.meses.forEach(m => {
      mesSelect.innerHTML += `<option value="${m}">${m}</option>`;
    });

  } catch (err) {
    console.error("Erro ao carregar filtros:", err);
  }
}

// =========================
// CARREGAR DADOS
// =========================
async function carregar() {
  try {
    const produto = document.getElementById("produto").value;
    const produtor = document.getElementById("produtor").value;
    const mes = document.getElementById("mes").value;

    const res = await fetch(`/dados?produto=${produto}&produtor=${produtor}&mes=${mes}`);
    const data = await res.json();

    // =========================
    // KPIs
    // =========================
    document.getElementById("k1").innerText = data.kpis.localidades;
    document.getElementById("k2").innerText = data.kpis.produtores;
    document.getElementById("k3").innerText = data.kpis.produtos;
    document.getElementById("k4").innerText = data.kpis.beneficiamentos;

    document.getElementById("k5").innerText =
      "R$ " + data.kpis.faturamento.toLocaleString("pt-BR", {
        minimumFractionDigits: 2
      });

    // =========================
    // GRÁFICO BAR
    // =========================
    if (barChart) barChart.destroy();

    if (data.g1.length > 0) {
      barChart = new Chart(document.getElementById("bar"), {
        type: "bar",
        data: {
          labels: data.g1.map(d => d.produtor),
          datasets: [{
            label: "Quantidade",
            data: data.g1.map(d => d.quantidade)
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false }
          }
        }
      });
    }

    // =========================
    // GRÁFICO PIE
    // =========================
    if (pieChart) pieChart.destroy();

    if (data.g2.length > 0) {
      pieChart = new Chart(document.getElementById("pie"), {
        type: "pie",
        data: {
          labels: data.g2.map(d => d.produto),
          datasets: [{
            data: data.g2.map(d => d.valor)
          }]
        }
      });
    }

  } catch (err) {
    console.error("Erro ao carregar dados:", err);
  }
}

// =========================
// INIT
// =========================
window.onload = () => {
  carregarFiltros();
  carregar();
};
</script>

</body>
</html>
